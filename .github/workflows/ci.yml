name: CI

on: [push]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  IMAGE_NAME: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/juice-shop

jobs:
  create_cache:
    runs-on: ubuntu-latest
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies (cache miss only)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: yarn install

  yarn_test:
    runs-on: ubuntu-latest
    needs: create_cache
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - run: yarn install
      - run: yarn test

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: zricethezav/gitleaks:latest
      options: --entrypoint ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - run: gitleaks detect --source . --verbose -f json -r gitleaks.json
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.json

  njsscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: nodejsscan scan
        id: njsscan
        uses: ajinabraham/njsscan-action@master
        with:
          args: '. --sarif --output results.sarif --exit-warning'
      - name: Upload njsscan report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
      - name: Save njsscan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: njsscan.sarif
          path: results.sarif

  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: semgrep/semgrep
    env:
      SEMGREP_RULES: p/javascript
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --json --output semgrep.json
      - name: Save semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep.json
          path: semgrep.json 

  retire:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - run: npm install -g retire
      - run: retire --path . --outputformat json --outputpath retire.json
      - name: Upload retire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retire.json
          path: retire.json         

  # upload_reports:
    # runs-on: ubuntu-latest
    # needs: [gitleaks, njsscan, semgrep, retire]
    # container: python:3
    # env:
    #  DEFECTDOJO_API_KEY: ${{ vars.DEFECTDOJO_API_KEY }}
    # steps:
      #- uses: actions/checkout@v4
      #- name: Download gitleaks report
      #  uses: actions/download-artifact@v4
      #  with:
      #    name: gitleaks-report
      #- name: Download njsscan.sarif
      #  uses: actions/download-artifact@v4
      #  with:
      #    name: njsscan.sarif
      #- run: mv results.sarif njsscan.sarif
      #- name: Download semgrep.json
      #  uses: actions/download-artifact@v4
     #   with:
      #    name: semgrep.json
     # - name: Download retire.json
    #    uses: actions/download-artifact@v4
    #    with:
    #      name: retire.json
    #  - run: pip install requests
    #  - run: python3 upload-report.py gitleaks.json
    #  - run: python3 upload-report.py njsscan.sarif
    #  - run: python3 upload-report.py semgrep.json
    #  - run: python3 upload-report.py retire.json     

  build_image:  
    runs-on: ubuntu-latest
    needs: [yarn_test, gitleaks, njsscan, semgrep]
    container: docker:24
    services:
      docker:
        image: docker:24-dind
    steps:
      - uses: actions/checkout@v4
      - name: Install AWS CLI
        run: |
          apk --no-cache add python3 py3-pip
          pip3 install --no-cache-dir --break-system-packages awscli
      - name: Set IMAGE_NAME
        run: echo "IMAGE_NAME=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/juice-shop" >> $GITHUB_ENV
      - run: aws ecr get-login-password | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .
      - run: docker push $IMAGE_NAME:${{ github.sha }}
      - run: docker push $IMAGE_NAME:latest