name: CI

on: [push]

env:
  IMAGE_NAME: ndubuisip/demo-app
  IMAGE_TAG: juice-shop-1.2

jobs:
  create_cache:
    runs-on: ubuntu-latest
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies (cache miss only)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: yarn install

  yarn_test:
    runs-on: ubuntu-latest
    needs: create_cache
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - run: yarn install
      - run: yarn test

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true          # intentional — keeps pipeline running
    container:
      image: zricethezav/gitleaks:latest
      options: --entrypoint ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - run: gitleaks detect --source . --verbose --report-format sarif --report-path gitleaks.sarif
      - name: Upload gitleaks report    # findings visible in GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

  njsscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4                          # updated from v2
      - name: nodejsscan scan
        id: njsscan
        uses: ajinabraham/njsscan-action@v0.7.0           # pinned from @master
        with:
          args: '. --sarif --output results.sarif --exit-warning'
      - name: Upload njsscan report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }} # added for authenticated scans
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --no-suppress-errors              # fail on analysis errors

build_image:
  runs-on: ubuntu-latest
  needs: [yarn_test, gitleaks, njsscan, semgrep]
  container: docker:24
  services:
    docker:
      image: docker:24-dind
  env:
    DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
    DOCKER_USER: ${{ secrets.DOCKER_USER }}
  steps:
    - uses: actions/checkout@v4
    - run: docker login -u $DOCKER_USER -p $DOCKER_PASS
    - run: docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - run: docker push $IMAGE_NAME:$IMAGE_TAG