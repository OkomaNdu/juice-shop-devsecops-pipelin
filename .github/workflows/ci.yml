name: CI

on: [push]

env:
  IMAGE_NAME: ndubuisip/demo-app
  IMAGE_TAG: juice-shop-1.2

jobs:
  create_cache:
    runs-on: ubuntu-latest
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - name: Restore cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - name: Install dependencies (cache miss only)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: yarn install

  yarn_test:
    runs-on: ubuntu-latest
    needs: create_cache
    container: node:18-bullseye
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
      - run: yarn install
      - run: yarn test

  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: zricethezav/gitleaks:latest
      options: --entrypoint ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - run: gitleaks detect --source . --verbose -f json -r gitleaks.json
      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.json

  njsscan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: nodejsscan scan
        id: njsscan
        uses: ajinabraham/njsscan-action@master
        with:
          args: '. --sarif --output results.sarif --exit-warning'
      - name: Upload njsscan report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
      - name: Save njsscan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: njsscan.sarif
          path: results.sarif

  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    container: semgrep/semgrep
    env:
      SEMGREP_RULES: p/javascript
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --json --output semgrep.json
      - name: Save semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep.json
          path: semgrep.json 

  upload_reports:
    runs-on: ubuntu-latest
    needs: [gitleaks]
    container: python:3
    env:
      DEFECTDOJO_API_KEY: ${{ vars.DEFECTDOJO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - run: python3 upload-report.py                 

  build_image:  # ← needs 2 spaces indent
    runs-on: ubuntu-latest
    needs: [yarn_test, gitleaks, njsscan, semgrep]
    container: docker:24
    services:
      docker:
        image: docker:24-dind
    env:
      DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
    steps:
      - uses: actions/checkout@v4
      - run: docker login -u $DOCKER_USER -p $DOCKER_PASS
      - run: docker build -t $IMAGE_NAME:$IMAGE_TAG .
      - run: docker push $IMAGE_NAME:$IMAGE_TAG